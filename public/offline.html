<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milo — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(180deg, #FFF4D6 0%, #FCEAB6 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px; gap: 20px; text-align: center;
    }
    .emoji { font-size: 72px; }
    h1 { font-size: 24px; font-weight: 800; color: #F26B2C; }
    p  { font-size: 16px; color: #888; max-width: 300px; line-height: 1.5; }
    button {
      background: linear-gradient(135deg, #F26B2C, #e05a1f);
      color: #fff; border: none; border-radius: 50px;
      padding: 14px 32px; font-size: 16px; font-weight: 800;
      cursor: pointer; margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="emoji">🦊</div>
  <h1>You're offline</h1>
  <p>Milo needs internet to load. Connect and tap retry — your progress is saved!</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
